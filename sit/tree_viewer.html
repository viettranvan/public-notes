<title>SIT Org Structure Explorer</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --ink-primary: #0b0b0b;
    --ink-secondary: #52514e;
    --ink-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --hover: rgba(11,11,11,0.045);
    --mark-bg: #ffe89a;
    --mark-ink: #3a2e00;
    --color-cluster: #2a78d6;
    --color-programme: #008300;
    --color-semester: #e87ba4;
    --color-course: #eda100;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --ink-primary: #ffffff;
      --ink-secondary: #c3c2b7;
      --ink-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --hover: rgba(255,255,255,0.06);
      --mark-bg: #5a4300;
      --mark-ink: #ffe89a;
      --color-cluster: #3987e5;
      --color-programme: #008300;
      --color-semester: #d55181;
      --color-course: #c98500;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height: 1.45;
  }
  .page {
    max-width: 1300px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }
  h1 { font-size: 22px; margin: 0 0 20px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
  }
  .stats-grid.secondary { margin-bottom: 20px; }
  .stat-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    border-top: 3px solid var(--tile-color, var(--baseline));
  }
  .stat-tile .label {
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-tile .value {
    font-size: 26px;
    font-weight: 600;
    color: var(--ink-primary);
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .rel-dots { display: inline-flex; align-items: center; gap: 3px; }
  .rel-dots .dot { width: 7px; height: 7px; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--ink-secondary);
  }
  .legend .legend-item { display: flex; align-items: center; gap: 6px; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--page);
    border: 1px solid var(--border);
    padding: 3px;
    border-radius: 9px;
  }
  .tab-btn {
    font: inherit;
    font-size: 13px;
    padding: 7px 13px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--ink-secondary);
    cursor: pointer;
  }
  .tab-btn[aria-selected="true"] {
    background: var(--surface);
    color: var(--ink-primary);
    box-shadow: 0 1px 2px var(--border);
  }
  .search-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex: 1;
    min-width: 260px;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input[type="search"] {
    width: 100%;
    font: inherit;
    font-size: 13px;
    padding: 8px 60px 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--ink-primary);
  }
  .search-wrap input[type="search"]::-webkit-search-cancel-button { display: none; }
  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    line-height: 1;
  }
  .match-counter {
    font-size: 12px;
    color: var(--ink-muted);
    white-space: nowrap;
  }
  .tree-actions { display: flex; gap: 6px; }
  .ghost-btn {
    font: inherit;
    font-size: 12px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--ink-secondary);
    cursor: pointer;
  }
  .ghost-btn:hover { background: var(--hover); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 900px) {
    .main-grid { grid-template-columns: 2fr 1fr; align-items: start; }
    .detail-panel { position: sticky; top: 16px; }
  }

  .tree-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    max-height: 74vh;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .quality-panel { max-height: none; }

  ul.tree-root, ul.children { list-style: none; margin: 0; padding-left: 0; }
  ul.children {
    padding-left: 18px;
    margin-left: 9px;
    border-left: 1px dashed var(--grid);
    display: none;
  }
  li.node.expanded > ul.children { display: block; }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    min-width: 0;
  }
  .row:hover { background: var(--hover); }
  .row:focus-visible { outline: 2px solid var(--color-cluster); outline-offset: -2px; }

  .toggle {
    width: 14px;
    flex-shrink: 0;
    text-align: center;
    color: var(--ink-muted);
    font-size: 10px;
    display: inline-block;
    transition: transform .12s ease;
  }
  li.node.expanded > .row > .toggle { transform: rotate(90deg); }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .label { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 7px; overflow: hidden; }
  .label .name {
    color: var(--ink-primary);
    font-weight: 500;
    font-size: 13.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .label .code {
    color: var(--ink-muted);
    font-size: 11.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .count {
    color: var(--ink-muted);
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    white-space: nowrap;
  }
  mark { background: var(--mark-bg); color: var(--mark-ink); border-radius: 2px; padding: 0 1px; }

  .group-row .name { font-style: italic; color: var(--ink-secondary); }

  .quality-groups { display: flex; flex-direction: column; gap: 18px; }
  .quality-group h3 { font-size: 14px; margin: 0 0 8px; }
  .muted-note { color: var(--ink-muted); font-size: 13px; margin: 0 0 8px; }
  ul.flat-list { max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 4px; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    max-height: 74vh;
    overflow-y: auto;
  }
  .detail-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .detail-nav-btn {
    border: 1px solid var(--border);
    background: var(--page);
    color: var(--ink-secondary);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 13px;
  }
  .detail-nav-btn:disabled { opacity: .35; cursor: default; }
  .detail-type-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-secondary);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .detail-name { font-size: 17px; margin: 0 0 10px; }
  .detail-meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin: 0 0 14px; font-size: 12.5px; }
  .detail-meta dt { color: var(--ink-muted); }
  .detail-meta dd { margin: 0; color: var(--ink-primary); word-break: break-word; }
  .detail-meta dd.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px; color: var(--ink-secondary); }
  .related-section { margin-bottom: 14px; }
  .related-section h4 { font-size: 12.5px; margin: 0 0 6px; color: var(--ink-secondary); }
  .pill-list { display: flex; flex-wrap: wrap; gap: 6px; max-height: 160px; overflow-y: auto; }
  .pill {
    font: inherit;
    font-size: 12px;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--pill-color, var(--baseline));
    background: var(--page);
    color: var(--ink-primary);
    cursor: pointer;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pill:hover { background: var(--hover); }
  .detail-placeholder { color: var(--ink-muted); font-size: 13px; }
</style>

<div class="page">
  <h1>SIT Org Structure Explorer</h1>

  <div class="stats-grid" id="stats-primary"></div>
  <div class="stats-grid secondary" id="stats-relations"></div>

  <div class="legend" id="legend"></div>

  <div class="controls">
    <div class="tabs" role="tablist" id="tabs">
      <button class="tab-btn" data-tab="cluster" aria-selected="true">Cluster ▸ Programme ▸ Course</button>
      <button class="tab-btn" data-tab="semester" aria-selected="false">Semester ▸ Course</button>
      <button class="tab-btn" data-tab="quality" aria-selected="false">Data Quality</button>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <input type="search" id="search-input" placeholder="Tìm theo tên, mã, hoặc ID…" autocomplete="off" />
        <button class="search-clear" id="search-clear" title="Xóa tìm kiếm">×</button>
      </div>
      <span class="match-counter" id="match-counter"></span>
      <div class="tree-actions">
        <button class="ghost-btn" id="expand-all">Mở hết</button>
        <button class="ghost-btn" id="collapse-all">Thu gọn</button>
      </div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="tree-panel" data-tab="cluster" id="panel-cluster"></div>
      <div class="tree-panel" data-tab="semester" id="panel-semester" hidden></div>
      <div class="tree-panel quality-panel" data-tab="quality" id="panel-quality" hidden></div>
    </div>
    <div class="detail-panel">
      <div class="detail-header">
        <button class="detail-nav-btn" id="detail-back" disabled>←</button>
        <button class="detail-nav-btn" id="detail-forward" disabled>→</button>
      </div>
      <div id="detail-body"><p class="detail-placeholder">Chọn một mục trong cây bên trái để xem chi tiết và các quan hệ liên quan.</p></div>
    </div>
  </div>
</div>

<script>
(async function () {
  const [clusters, programmes, semesters, courses,
         mapClusterProgramme, mapClusterCourse, mapProgrammeCourse, mapSemesterCourse] = await Promise.all([
    'assests/clusterDump.json',
    'assests/programmeDump.json',
    'assests/semesterDump.json',
    'assests/courseDump.json',
    'assests/map_cluster_programme.json',
    'assests/map_cluster_course.json',
    'assests/map_programme_course.json',
    'assests/map_semester_course.json',
  ].map(url => fetch(url).then(res => res.json())));

  function indexBy(arr) {
    const m = new Map();
    for (const item of arr) m.set(item.Identifier, item);
    return m;
  }
  const clusterById = indexBy(clusters);
  const programmeById = indexBy(programmes);
  const semesterById = indexBy(semesters);
  const courseById = indexBy(courses);

  function buildAdjacency(pairs, parentKey, childKey) {
    const forward = new Map();
    const backward = new Map();
    for (const p of pairs) {
      const pid = p[parentKey], cid = p[childKey];
      if (!forward.has(pid)) forward.set(pid, []);
      forward.get(pid).push(cid);
      if (!backward.has(cid)) backward.set(cid, []);
      backward.get(cid).push(pid);
    }
    return { forward, backward };
  }

  const clusterProgramme = buildAdjacency(mapClusterProgramme, 'clusterId', 'programmeId');
  const clusterCourse = buildAdjacency(mapClusterCourse, 'clusterId', 'courseId');
  const programmeCourse = buildAdjacency(mapProgrammeCourse, 'programmeId', 'courseId');
  const semesterCourse = buildAdjacency(mapSemesterCourse, 'semesterId', 'courseId');

  const TYPE_META = {
    cluster: { label: 'Cluster', color: 'var(--color-cluster)', entities: clusterById },
    programme: { label: 'Programme', color: 'var(--color-programme)', entities: programmeById },
    semester: { label: 'Semester', color: 'var(--color-semester)', entities: semesterById },
    course: { label: 'Course', color: 'var(--color-course)', entities: courseById },
  };

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function highlight(text, query) {
    const raw = String(text || '');
    if (!query) return escapeHtml(raw);
    const idx = raw.toLowerCase().indexOf(query);
    if (idx === -1) return escapeHtml(raw);
    return escapeHtml(raw.slice(0, idx)) + '<mark>' + escapeHtml(raw.slice(idx, idx + query.length)) + '</mark>' + escapeHtml(raw.slice(idx + query.length));
  }

  function createNodeLi(type, id, { hasChildren = false, extraCountLabel = null } = {}) {
    const entity = TYPE_META[type].entities.get(id);
    const li = document.createElement('li');
    li.className = 'node ' + type + (hasChildren ? '' : ' leaf');
    const searchText = `${entity?.Name || ''} ${entity?.Code || ''} ${id}`.toLowerCase();
    li.dataset.search = searchText;

    const row = document.createElement('div');
    row.className = 'row';
    row.tabIndex = 0;
    row.title = `${entity?.Name || '(unknown)'}${entity?.Code ? ' · ' + entity.Code : ''} · ID ${id}${entity?.Path ? '\n' + entity.Path : ''}`;

    const toggle = document.createElement('span');
    toggle.className = 'toggle';
    toggle.textContent = hasChildren ? '▸' : '';
    row.appendChild(toggle);

    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = TYPE_META[type].color;
    row.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'label';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.dataset.raw = entity?.Name || `(#${id})`;
    nameSpan.textContent = nameSpan.dataset.raw;
    label.appendChild(nameSpan);

    if (entity?.Code) {
      const codeSpan = document.createElement('span');
      codeSpan.className = 'code';
      codeSpan.dataset.raw = entity.Code;
      codeSpan.textContent = entity.Code;
      label.appendChild(codeSpan);
    }
    row.appendChild(label);

    if (extraCountLabel) {
      const count = document.createElement('span');
      count.className = 'count';
      count.textContent = extraCountLabel;
      row.appendChild(count);
    }

    li.appendChild(row);

    row.addEventListener('click', () => {
      if (hasChildren) li.classList.toggle('expanded');
      showDetail(type, id);
    });
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); row.click(); }
    });

    return li;
  }

  function nameOf(type, id) { return TYPE_META[type].entities.get(id)?.Name || ''; }
  function byName(type) { return (a, b) => nameOf(type, a).localeCompare(nameOf(type, b)); }

  function buildClusterTree() {
    const root = document.createElement('ul');
    root.className = 'tree-root';
    const sortedClusters = [...clusters].sort((a, b) => a.Name.localeCompare(b.Name));

    for (const cluster of sortedClusters) {
      const programmeIds = clusterProgramme.forward.get(cluster.Identifier) || [];
      const directCourseIds = clusterCourse.forward.get(cluster.Identifier) || [];

      const viaProgrammeCourseIds = new Set();
      for (const pid of programmeIds) {
        for (const cid of (programmeCourse.forward.get(pid) || [])) viaProgrammeCourseIds.add(cid);
      }
      const directOnly = directCourseIds.filter(cid => !viaProgrammeCourseIds.has(cid));
      const totalCourses = new Set([...viaProgrammeCourseIds, ...directCourseIds]).size;
      const hasChildren = programmeIds.length > 0 || directOnly.length > 0;

      const li = createNodeLi('cluster', cluster.Identifier, {
        hasChildren,
        extraCountLabel: `${programmeIds.length} chương trình · ${totalCourses} môn`
      });

      if (hasChildren) {
        const childUl = document.createElement('ul');
        childUl.className = 'children';

        for (const pid of [...programmeIds].sort(byName('programme'))) {
          const courseIds = programmeCourse.forward.get(pid) || [];
          const pHasChildren = courseIds.length > 0;
          const pLi = createNodeLi('programme', pid, { hasChildren: pHasChildren, extraCountLabel: `${courseIds.length} môn` });
          if (pHasChildren) {
            const cUl = document.createElement('ul');
            cUl.className = 'children';
            for (const cid of [...courseIds].sort(byName('course'))) cUl.appendChild(createNodeLi('course', cid));
            pLi.appendChild(cUl);
          }
          childUl.appendChild(pLi);
        }

        if (directOnly.length > 0) {
          const groupLi = document.createElement('li');
          groupLi.className = 'node group leaf-group';
          const groupRow = document.createElement('div');
          groupRow.className = 'row group-row';
          groupRow.innerHTML =
            '<span class="toggle">▸</span>' +
            '<span class="dot" style="background:var(--ink-muted)"></span>' +
            '<span class="label"><span class="name">Gắn trực tiếp (không qua chương trình)</span></span>' +
            `<span class="count">${directOnly.length} môn</span>`;
          groupLi.appendChild(groupRow);
          const gUl = document.createElement('ul');
          gUl.className = 'children';
          for (const cid of [...directOnly].sort(byName('course'))) gUl.appendChild(createNodeLi('course', cid));
          groupLi.appendChild(gUl);
          groupRow.addEventListener('click', () => groupLi.classList.toggle('expanded'));
          childUl.appendChild(groupLi);
        }

        li.appendChild(childUl);
      }
      root.appendChild(li);
    }
    return root;
  }

  function buildSemesterTree() {
    const root = document.createElement('ul');
    root.className = 'tree-root';
    const sorted = [...semesters].sort((a, b) => Number(a.Identifier) - Number(b.Identifier));

    for (const sem of sorted) {
      const courseIds = semesterCourse.forward.get(sem.Identifier) || [];
      const hasChildren = courseIds.length > 0;
      const li = createNodeLi('semester', sem.Identifier, { hasChildren, extraCountLabel: `${courseIds.length} môn` });
      if (hasChildren) {
        const ul = document.createElement('ul');
        ul.className = 'children';
        for (const cid of [...courseIds].sort(byName('course'))) ul.appendChild(createNodeLi('course', cid));
        li.appendChild(ul);
      }
      root.appendChild(li);
    }
    return root;
  }

  function computeOrphans() {
    return {
      programmesNoCluster: programmes.filter(p => !clusterProgramme.backward.has(p.Identifier)),
      coursesNoCluster: courses.filter(c => !clusterCourse.backward.has(c.Identifier)),
      coursesNoProgramme: courses.filter(c => !programmeCourse.backward.has(c.Identifier)),
      coursesNoSemester: courses.filter(c => !semesterCourse.backward.has(c.Identifier)),
      coursesMultiProgramme: courses.filter(c => (programmeCourse.backward.get(c.Identifier) || []).length > 1),
      coursesMultiCluster: courses.filter(c => (clusterCourse.backward.get(c.Identifier) || []).length > 1),
      coursesMultiSemester: courses.filter(c => (semesterCourse.backward.get(c.Identifier) || []).length > 1),
    };
  }

  function buildDataQualityView() {
    const o = computeOrphans();
    const root = document.createElement('div');
    root.className = 'quality-groups';
    const groups = [
      { type: 'programme', title: 'Programme không gắn Cluster nào', items: o.programmesNoCluster },
      { type: 'course', title: 'Course không gắn Cluster nào', items: o.coursesNoCluster },
      { type: 'course', title: 'Course không gắn Programme nào', items: o.coursesNoProgramme },
      { type: 'course', title: 'Course không gắn Semester nào', items: o.coursesNoSemester },
      { type: 'course', title: 'Course gắn ≥ 2 Programme', items: o.coursesMultiProgramme },
      { type: 'course', title: 'Course gắn ≥ 2 Cluster', items: o.coursesMultiCluster },
      { type: 'course', title: 'Course gắn ≥ 2 Semester', items: o.coursesMultiSemester },
    ];
    for (const g of groups) {
      const section = document.createElement('div');
      section.className = 'quality-group';
      const h = document.createElement('h3');
      h.textContent = `${g.title} (${g.items.length})`;
      section.appendChild(h);
      if (g.items.length === 0) {
        const p = document.createElement('p');
        p.className = 'muted-note';
        p.textContent = 'Không có.';
        section.appendChild(p);
      } else {
        const ul = document.createElement('ul');
        ul.className = 'tree-root flat-list';
        for (const item of [...g.items].sort((a, b) => a.Name.localeCompare(b.Name))) {
          ul.appendChild(createNodeLi(g.type, item.Identifier));
        }
        section.appendChild(ul);
      }
      root.appendChild(section);
    }
    return root;
  }

  document.getElementById('panel-cluster').appendChild(buildClusterTree());
  document.getElementById('panel-semester').appendChild(buildSemesterTree());
  document.getElementById('panel-quality').appendChild(buildDataQualityView());

  // --- Stat tiles ---
  const statsPrimary = document.getElementById('stats-primary');
  const primaryTiles = [
    { type: 'cluster', label: 'Cluster', value: clusters.length },
    { type: 'programme', label: 'Programme', value: programmes.length },
    { type: 'semester', label: 'Semester', value: semesters.length },
    { type: 'course', label: 'Course', value: courses.length },
  ];
  statsPrimary.innerHTML = primaryTiles.map(t => `
    <div class="stat-tile" style="--tile-color:${TYPE_META[t.type].color}">
      <div class="label"><span class="dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${TYPE_META[t.type].color}"></span>${t.label}</div>
      <div class="value">${t.value.toLocaleString()}</div>
    </div>
  `).join('');

  const statsRelations = document.getElementById('stats-relations');
  const relationTiles = [
    { from: 'cluster', to: 'programme', label: 'Cluster → Programme', value: mapClusterProgramme.length },
    { from: 'cluster', to: 'course', label: 'Cluster → Course', value: mapClusterCourse.length },
    { from: 'programme', to: 'course', label: 'Programme → Course', value: mapProgrammeCourse.length },
    { from: 'semester', to: 'course', label: 'Semester → Course', value: mapSemesterCourse.length },
  ];
  statsRelations.innerHTML = relationTiles.map(t => `
    <div class="stat-tile">
      <div class="label">
        <span class="rel-dots">
          <span class="dot" style="background:${TYPE_META[t.from].color}"></span>
          <span class="dot" style="background:${TYPE_META[t.to].color}"></span>
        </span>
        ${t.label}
      </div>
      <div class="value">${t.value.toLocaleString()}</div>
    </div>
  `).join('');

  document.getElementById('legend').innerHTML = Object.entries(TYPE_META).map(([key, meta]) => `
    <span class="legend-item"><span class="dot" style="width:9px;height:9px;border-radius:50%;background:${meta.color}"></span>${meta.label}</span>
  `).join('');

  // --- Tabs ---
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tree-panel');
  tabs.forEach(btn => btn.addEventListener('click', () => {
    tabs.forEach(b => b.setAttribute('aria-selected', b === btn ? 'true' : 'false'));
    panels.forEach(p => { p.hidden = p.dataset.tab !== btn.dataset.tab; });
    applySearch();
  }));
  function activePanel() { return document.querySelector('.tree-panel:not([hidden])'); }

  // --- Expand / Collapse all ---
  document.getElementById('expand-all').addEventListener('click', () => {
    activePanel().querySelectorAll('li.node').forEach(li => {
      if (li.querySelector(':scope > ul.children')) li.classList.add('expanded');
    });
  });
  document.getElementById('collapse-all').addEventListener('click', () => {
    activePanel().querySelectorAll('li.node').forEach(li => li.classList.remove('expanded'));
  });

  // --- Search ---
  const searchInput = document.getElementById('search-input');
  const matchCounter = document.getElementById('match-counter');
  let searchTimer = null;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applySearch, 100);
  });
  document.getElementById('search-clear').addEventListener('click', () => {
    searchInput.value = '';
    applySearch();
    searchInput.focus();
  });

  function applySearch() {
    const query = searchInput.value.trim().toLowerCase();
    const panel = activePanel();
    if (!panel) return;
    const allLis = panel.querySelectorAll('li.node');

    if (!query) {
      allLis.forEach(li => { li.style.display = ''; });
      panel.querySelectorAll('.name, .code').forEach(el => { el.innerHTML = escapeHtml(el.dataset.raw || el.textContent); });
      matchCounter.textContent = '';
      return;
    }

    const matches = new Set();
    allLis.forEach(li => {
      if ((li.dataset.search || '').includes(query)) matches.add(li);
    });

    const keep = new Set(matches);
    matches.forEach(li => {
      let p = li.parentElement && li.parentElement.closest('li.node');
      while (p) { keep.add(p); p = p.parentElement && p.parentElement.closest('li.node'); }
    });

    allLis.forEach(li => {
      if (keep.has(li)) {
        li.style.display = '';
        if (!matches.has(li) && li.querySelector(':scope > ul.children')) li.classList.add('expanded');
      } else {
        li.style.display = 'none';
      }
    });

    panel.querySelectorAll('.name, .code').forEach(el => {
      el.innerHTML = highlight(el.dataset.raw, query);
    });

    matchCounter.textContent = `${matches.size} kết quả`;
  }

  // --- Detail panel ---
  let detailHistory = [];
  let detailIndex = -1;

  function updateHistoryButtons() {
    document.getElementById('detail-back').disabled = detailIndex <= 0;
    document.getElementById('detail-forward').disabled = detailIndex >= detailHistory.length - 1;
  }
  document.getElementById('detail-back').addEventListener('click', () => {
    if (detailIndex > 0) { detailIndex--; renderDetail(detailHistory[detailIndex].type, detailHistory[detailIndex].id); updateHistoryButtons(); }
  });
  document.getElementById('detail-forward').addEventListener('click', () => {
    if (detailIndex < detailHistory.length - 1) { detailIndex++; renderDetail(detailHistory[detailIndex].type, detailHistory[detailIndex].id); updateHistoryButtons(); }
  });

  function showDetail(type, id) {
    detailHistory = detailHistory.slice(0, detailIndex + 1);
    detailHistory.push({ type, id });
    detailIndex = detailHistory.length - 1;
    renderDetail(type, id);
    updateHistoryButtons();
  }

  function relatedSection(title, ids, type) {
    if (!ids.length) return `<div class="related-section"><h4>${title} (0)</h4><p class="muted-note">Không có.</p></div>`;
    const sorted = [...ids].sort(byName(type));
    const pills = sorted.map(rid => {
      const e = TYPE_META[type].entities.get(rid);
      return `<button class="pill" data-nav-type="${type}" data-nav-id="${escapeHtml(rid)}" style="--pill-color:${TYPE_META[type].color}" title="${escapeHtml(e?.Name || '')}">${escapeHtml(e?.Name || ('#' + rid))}</button>`;
    }).join('');
    return `<div class="related-section"><h4>${title} (${ids.length})</h4><div class="pill-list">${pills}</div></div>`;
  }

  function renderDetail(type, id) {
    const entity = TYPE_META[type].entities.get(id);
    const panel = document.getElementById('detail-body');
    if (!entity) { panel.innerHTML = '<p class="muted-note">Không tìm thấy.</p>'; return; }

    let relatedHtml = '';
    if (type === 'cluster') {
      relatedHtml += relatedSection('Chương trình (Programme)', clusterProgramme.forward.get(id) || [], 'programme');
      relatedHtml += relatedSection('Môn học trực tiếp (Course)', clusterCourse.forward.get(id) || [], 'course');
    } else if (type === 'programme') {
      relatedHtml += relatedSection('Thuộc Cluster', clusterProgramme.backward.get(id) || [], 'cluster');
      relatedHtml += relatedSection('Môn học (Course)', programmeCourse.forward.get(id) || [], 'course');
    } else if (type === 'semester') {
      relatedHtml += relatedSection('Môn học (Course)', semesterCourse.forward.get(id) || [], 'course');
    } else if (type === 'course') {
      relatedHtml += relatedSection('Thuộc Cluster', clusterCourse.backward.get(id) || [], 'cluster');
      relatedHtml += relatedSection('Thuộc Programme', programmeCourse.backward.get(id) || [], 'programme');
      relatedHtml += relatedSection('Thuộc Semester', semesterCourse.backward.get(id) || [], 'semester');
    }

    panel.innerHTML = `
      <div class="detail-type-chip"><span class="dot" style="width:8px;height:8px;border-radius:50%;display:inline-block;background:${TYPE_META[type].color}"></span>${TYPE_META[type].label}</div>
      <h3 class="detail-name">${escapeHtml(entity.Name || '')}</h3>
      <dl class="detail-meta">
        <dt>Code</dt><dd>${escapeHtml(entity.Code || '—')}</dd>
        <dt>ID</dt><dd>${escapeHtml(id)}</dd>
        <dt>Path</dt><dd class="mono">${escapeHtml(entity.Path || '—')}</dd>
      </dl>
      ${relatedHtml}
    `;
    panel.querySelectorAll('[data-nav-type]').forEach(el => {
      el.addEventListener('click', () => showDetail(el.dataset.navType, el.dataset.navId));
    });
  }
})();
</script>
